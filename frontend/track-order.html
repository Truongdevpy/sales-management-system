<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Orders - Shopping</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>My Orders</h1>
                </div>

                <div class="grid grid-cols-3 gap-20" style="gap: 24px;">
                    
                    <!-- Order List -->
                    <div style="grid-column: span 2;">
                        <div class="card mb-4">
                            <h3 style="font-size: 16px; margin-bottom: 20px;">Order History</h3>
                            <div class="table-responsive">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Order ID</th>
                                            <th>Date</th>
                                            <th>Total</th>
                                            <th>Payment</th>
                                            <th>Shipping</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="ordersBody">
                                        <!-- Rendered by JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Order Details Panel -->
                    <div>
                        <div class="card" style="position: sticky; top: 90px;" id="orderDetailsPanel">
                            <div class="flex justify-between items-center" style="margin-bottom: 20px;">
                                <h3 style="font-size: 16px; color: var(--dark);">Order Details</h3>
                                <span class="badge" style="background: rgba(0,0,0,0.05); color: var(--text);" id="detailOrderId">Select order</span>
                            </div>
                            
                            <div id="detailContent" class="text-center text-light mt-4">
                                <i class='bx bx-package' style="font-size: 40px; margin-bottom: 10px; color: var(--border);"></i>
                                <p>Click an order to view details</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        const user = requireAuth(['customer']);
        
        if (user) {
            renderSidebarMenu(user.role, 'track-order');
            renderHeader(user);
            renderOrders();
        }

        function renderOrders() {
            const tbody = document.getElementById('ordersBody');
            let html = '';
            
            const myOrders = DB.orders.filter(o => o.customerId === user.id);

            myOrders.forEach(o => {
                let payBadge = o.paymentStatus === 'paid' ? 'badge-success' : 'badge-warning';
                let shipBadge = o.shippingStatus === 'delivered' ? 'badge-active' : 'badge-pending';
                
                html += `
                    <tr>
                        <td><strong>#ORD-${o.id}</strong></td>
                        <td>${formatDate(o.createdAt)}</td>
                        <td style="font-weight: 600;">${formatMoney(o.totalAmount)}</td>
                        <td><span class="badge ${payBadge}">${o.paymentStatus.toUpperCase()}</span></td>
                        <td><span class="badge ${shipBadge}">${o.shippingStatus.toUpperCase()}</span></td>
                        <td>
                            <button class="btn btn-outline" style="padding: 5px 10px;" onclick="viewOrderDetails(${o.id})">
                                <i class='bx bx-right-arrow-alt'></i> Details
                            </button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function viewOrderDetails(orderId) {
            const order = DB.orders.find(o => o.id === orderId);
            const items = DB.orderItems.filter(i => i.orderId === orderId);
            const panel = document.getElementById('detailContent');
            
            document.getElementById('detailOrderId').innerText = `#ORD-${order.id}`;

            let itemsHtml = items.map(item => `
                <div class="flex justify-between items-center mb-3" style="padding-bottom: 10px; border-bottom: 1px solid var(--border);">
                    <div>
                        <div style="font-weight: 500; font-size: 14px;">${item.name}</div>
                        <div style="font-size: 12px; color: var(--text-light);">Qty: ${item.quantity} x ${formatMoney(item.price)}</div>
                    </div>
                    <div style="font-weight: 600;">${formatMoney(item.quantity * item.price)}</div>
                </div>
            `).join('');

            panel.innerHTML = `
                <div class="mb-4 text-left">
                    <p style="font-size: 13px; color: var(--text-light); margin-bottom: 4px;">Tracking Timeline</p>
                    
                    <div class="flex items-center gap-2 mb-2">
                        <i class='bx bxs-check-circle' style="color: var(--success);"></i>
                        <span style="font-size: 14px;">Order Placed</span>
                    </div>
                    
                    <div class="flex items-center gap-2 mb-2">
                        <i class='bx bxs-check-circle' style="color: ${order.paymentStatus === 'paid' ? 'var(--success)' : 'var(--border)'};"></i>
                        <span style="font-size: 14px;">Payment Confirmed</span>
                    </div>

                    <div class="flex items-center gap-2 mb-2">
                        <i class='bx bxs-check-circle' style="color: ${order.shippingStatus === 'delivered' ? 'var(--success)' : 'var(--border)'};"></i>
                        <span style="font-size: 14px;">Delivered</span>
                    </div>
                </div>

                <div class="text-left mt-4 pt-4" style="border-top: 1px dashed var(--border);">
                    <h4 style="font-size: 14px; margin-bottom: 12px;">Items Ordered</h4>
                    ${itemsHtml}
                    
                    <div class="flex justify-between mt-3">
                        <span style="font-weight: 600;">Total Paid</span>
                        <span style="font-weight: 700; color: var(--primary);">${formatMoney(order.totalAmount)}</span>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
