<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Manager - Sales System</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>Customer Manager</h1>
                </div>

                <div class="grid grid-cols-4 mb-4">
                    <div class="card stat-card">
                        <div class="stat-icon primary"><i class='bx bx-group'></i></div>
                        <div class="stat-details"><h3 id="totalCustomers">0</h3><p>Total Customers</p></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon success"><i class='bx bx-user-check'></i></div>
                        <div class="stat-details"><h3 id="activeCustomers">0</h3><p>With Orders</p></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon warning"><i class='bx bx-user-x'></i></div>
                        <div class="stat-details"><h3 id="inactiveCustomers">0</h3><p>No Orders</p></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon info"><i class='bx bx-wallet'></i></div>
                        <div class="stat-details"><h3 id="totalSpent">0 VNĐ</h3><p>Total Spent</p></div>
                    </div>
                </div>

                <div class="card">
                    <div class="flex justify-between items-center mb-4 seller-toolbar">
                        <div class="flex gap-2 seller-filters">
                            <div class="header-search" style="border: 1px solid var(--border); background: var(--bg);">
                                <i class='bx bx-search'></i>
                                <input type="text" id="customerKeyword" placeholder="Search customers..." oninput="debouncedLoadCustomers()">
                            </div>
                            <select class="form-control" id="customerStatusFilter" style="width: 160px;" onchange="loadCustomers()">
                                <option value="all">All customers</option>
                                <option value="active">With orders</option>
                                <option value="inactive">No orders</option>
                            </select>
                        </div>
                        <button class="btn btn-outline" onclick="loadCustomers()"><i class='bx bx-refresh'></i> Refresh</button>
                    </div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Customer</th>
                                    <th>Username</th>
                                    <th>Phone</th>
                                    <th>Address</th>
                                    <th>Orders</th>
                                    <th>Total Spent</th>
                                    <th>Last Order</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="customersBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="customerModal">
        <div class="modal seller-modal">
            <div class="modal-header">
                <h3 id="customerModalTitle">Customer Details</h3>
                <button class="close-modal" onclick="closeCustomerModal()">&times;</button>
            </div>
            <div class="modal-body" id="customerModalBody"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const user = requireAuth(['admin']);
        let customers = [];
        let searchTimer = null;

        if (user) {
            renderSidebarMenu(user.role, 'customer-management');
            renderHeader(user);
            initCustomerManager();
        }

        async function initCustomerManager() {
            const sessionUser = await refreshSessionUser();
            if (!sessionUser || sessionUser.role !== 'admin') {
                localStorage.removeItem('currentUser');
                window.location.href = '/';
                return;
            }
            loadCustomers();
        }

        function debouncedLoadCustomers() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadCustomers, 250);
        }

        async function loadCustomers() {
            const tbody = document.getElementById('customersBody');
            tbody.innerHTML = loadingRow(9);

            const keyword = document.getElementById('customerKeyword').value.trim();
            const status = document.getElementById('customerStatusFilter').value;
            const params = new URLSearchParams({ keyword, status });

            try {
                const response = await fetch(`/api/customers/management?${params.toString()}`, { credentials: 'same-origin' });
                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }
                customers = await response.json();
                if (!response.ok) throw new Error('Cannot load customers');
                updateCustomerStats();
                renderCustomersTable();
            } catch (error) {
                tbody.innerHTML = errorRow(9, 'Cannot load customers');
            }
        }

        function updateCustomerStats() {
            const active = customers.filter(customer => customer.status === 'active').length;
            const totalSpent = customers.reduce((sum, customer) => sum + Number(customer.totalSpent || 0), 0);
            document.getElementById('totalCustomers').innerText = customers.length;
            document.getElementById('activeCustomers').innerText = active;
            document.getElementById('inactiveCustomers').innerText = customers.length - active;
            document.getElementById('totalSpent').innerText = formatMoney(totalSpent);
        }

        function renderCustomersTable() {
            const tbody = document.getElementById('customersBody');
            if (!customers.length) {
                tbody.innerHTML = emptyRow(9, 'No customers found');
                return;
            }

            tbody.innerHTML = customers.map(customer => `
                <tr>
                    <td>#${customer.id}</td>
                    <td>
                        <strong>${escapeHtml(customer.fullName || '-')}</strong>
                        <div style="color: var(--text-light); font-size: 12px;">${formatDateSafe(customer.createdAt)}</div>
                    </td>
                    <td>${escapeHtml(customer.username || '-')}</td>
                    <td>${escapeHtml(customer.phone || '-')}</td>
                    <td>${escapeHtml(customer.address || '-')}</td>
                    <td>${Number(customer.totalOrders || 0)}</td>
                    <td><strong>${formatMoney(Number(customer.totalSpent || 0))}</strong></td>
                    <td>${formatDateSafe(customer.lastOrderAt)}</td>
                    <td>
                        <div class="flex gap-2">
                            <button class="btn btn-outline btn-icon-sm" title="View" onclick="openCustomerDetail(${customer.id})"><i class='bx bx-show'></i></button>
                            <button class="btn btn-outline btn-icon-sm" title="Edit" onclick="openCustomerEdit(${customer.id})"><i class='bx bx-edit'></i></button>
                            <button class="btn btn-danger btn-icon-sm" title="Delete" onclick="deleteCustomer(${customer.id})"><i class='bx bx-trash'></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function openCustomerDetail(id) {
            document.getElementById('customerModalTitle').innerText = 'Customer Details';
            document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="padding: 30px;">Loading...</p>`;
            document.getElementById('customerModal').classList.add('active');

            try {
                const response = await fetch(`/api/customers/management/${id}`, { credentials: 'same-origin' });
                const customer = await response.json();
                if (!response.ok) {
                    document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">${customer.message || 'Customer not found'}</p>`;
                    return;
                }
                renderCustomerDetail(customer);
            } catch (error) {
                document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">Cannot load customer</p>`;
            }
        }

        function renderCustomerDetail(customer) {
            document.getElementById('customerModalBody').innerHTML = `
                <div class="seller-detail-grid mb-4">
                    <div><p class="seller-field-label">Full Name</p><p class="seller-field-value">${escapeHtml(customer.fullName || '-')}</p></div>
                    <div><p class="seller-field-label">Username</p><p class="seller-field-value">${escapeHtml(customer.username || '-')}</p></div>
                    <div><p class="seller-field-label">Phone</p><p class="seller-field-value">${escapeHtml(customer.phone || '-')}</p></div>
                    <div><p class="seller-field-label">Address</p><p class="seller-field-value">${escapeHtml(customer.address || '-')}</p></div>
                    <div><p class="seller-field-label">Joined</p><p class="seller-field-value">${formatDateSafe(customer.createdAt)}</p></div>
                    <div><p class="seller-field-label">Status</p><p class="seller-field-value"><span class="badge ${customer.status === 'active' ? 'badge-success' : 'badge-warning'}">${customer.status}</span></p></div>
                </div>
                <div class="grid grid-cols-4 mb-4 seller-detail-stats">
                    <div class="seller-metric"><strong>${Number(customer.totalOrders || 0)}</strong><span>Orders</span></div>
                    <div class="seller-metric"><strong>${Number(customer.totalProducts || 0)}</strong><span>Products</span></div>
                    <div class="seller-metric"><strong>${formatMoney(Number(customer.totalSpent || 0))}</strong><span>Total Spent</span></div>
                    <div class="seller-metric"><strong>${formatDateSafe(customer.lastOrderAt)}</strong><span>Last Order</span></div>
                </div>
                <div class="flex justify-end gap-2">
                    <button class="btn btn-outline" onclick="openCustomerEdit(${customer.id})"><i class='bx bx-edit'></i> Edit</button>
                    <button class="btn btn-danger" onclick="deleteCustomer(${customer.id})"><i class='bx bx-trash'></i> Delete</button>
                </div>
            `;
        }

        async function openCustomerEdit(id) {
            document.getElementById('customerModalTitle').innerText = 'Edit Customer';
            document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="padding: 30px;">Loading...</p>`;
            document.getElementById('customerModal').classList.add('active');

            try {
                const response = await fetch(`/api/customers/management/${id}`, { credentials: 'same-origin' });
                const customer = await response.json();
                if (!response.ok) {
                    document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">${customer.message || 'Customer not found'}</p>`;
                    return;
                }
                renderCustomerEdit(customer);
            } catch (error) {
                document.getElementById('customerModalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">Cannot load customer</p>`;
            }
        }

        function renderCustomerEdit(customer) {
            document.getElementById('customerModalBody').innerHTML = `
                <form id="customerEditForm" onsubmit="saveCustomer(event, ${customer.id})">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-group">
                            <label>Full name</label>
                            <input class="form-control" id="editFullName" value="${escapeAttr(customer.fullName || '')}" required>
                        </div>
                        <div class="form-group">
                            <label>Username / Email</label>
                            <input class="form-control" id="editUsername" value="${escapeAttr(customer.username || '')}" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input class="form-control" id="editPhone" value="${escapeAttr(customer.phone || '')}" placeholder="0901000001">
                        </div>
                        <div class="form-group">
                            <label>New password</label>
                            <input class="form-control" id="editPassword" type="password" placeholder="Leave blank">
                        </div>
                    </div>
                    <div class="form-group mt-2">
                        <label>Address</label>
                        <input class="form-control" id="editAddress" value="${escapeAttr(customer.address || '')}">
                    </div>
                    <div class="flex justify-end gap-2 mt-4">
                        <button type="button" class="btn btn-outline" onclick="closeCustomerModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> Save</button>
                    </div>
                </form>
            `;
        }

        async function saveCustomer(event, id) {
            event.preventDefault();
            const payload = {
                fullName: document.getElementById('editFullName').value.trim(),
                username: document.getElementById('editUsername').value.trim(),
                phone: document.getElementById('editPhone').value.trim(),
                address: document.getElementById('editAddress').value.trim(),
                password: document.getElementById('editPassword').value,
            };

            try {
                const response = await fetch(`/api/customers/management/${id}`, {
                    method: 'PUT',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Cannot update customer');
                    return;
                }
                closeCustomerModal();
                loadCustomers();
            } catch (error) {
                alert('Cannot connect to server');
            }
        }

        async function deleteCustomer(id) {
            if (!confirm('Delete this customer account? Related orders may also be removed.')) return;

            try {
                const response = await fetch(`/api/customers/management/${id}`, {
                    method: 'DELETE',
                    credentials: 'same-origin',
                });
                const result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Cannot delete customer');
                    return;
                }
                closeCustomerModal();
                loadCustomers();
            } catch (error) {
                alert('Cannot connect to server');
            }
        }

        function closeCustomerModal() {
            document.getElementById('customerModal').classList.remove('active');
        }

        function loadingRow(colspan) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px;">Loading...</td></tr>`;
        }

        function emptyRow(colspan, message) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px;">${message}</td></tr>`;
        }

        function errorRow(colspan, message) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px; color: var(--danger);">${message}</td></tr>`;
        }

        function formatDateSafe(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('vi-VN');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
