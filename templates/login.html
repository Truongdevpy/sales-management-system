<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-sm rounded-xl shadow-lg border border-gray-100">
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-sign-in-alt text-2xl text-blue-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Chào mừng trở lại</h2>
                <p class="text-gray-500 text-sm">Vui lòng nhập thông tin để tiếp tục</p>
            </div>

            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <input type="text" name="username" required placeholder="Tên đăng nhập" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition">
                </div>

                <div>
                    <input type="password" name="password" required placeholder="Mật khẩu" 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:bg-white focus:ring-2 focus:ring-blue-400 outline-none transition">
                </div>

                <div class="flex items-center justify-between text-xs text-gray-500">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" class="mr-1 rounded text-blue-600"> Ghi nhớ tôi
                    </label>
                    <a href="#" class="hover:text-blue-600">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold hover:bg-slate-700 transition shadow-md">
                    ĐĂNG NHẬP
                </button>
            </form>

            <div class="mt-8 text-center border-t pt-6">
                <p class="text-sm text-gray-600">
                    Bạn mới đến đây? <a href="register" class="text-blue-600 font-bold hover:underline">Tạo tài khoản mới</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
