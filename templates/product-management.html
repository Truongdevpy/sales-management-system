<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Sales System</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>Product Management</h1>
                    <button class="btn btn-primary" onclick="openProductForm()"><i class='bx bx-plus'></i> Add Product</button>
                </div>

                <div class="grid grid-cols-4 mb-4">
                    <div class="card stat-card">
                        <div class="stat-icon primary"><i class='bx bx-package'></i></div>
                        <div class="stat-details"><h3 id="totalProducts">0</h3><p>Total Products</p></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon success"><i class='bx bx-check-circle'></i></div>
                        <div class="stat-details"><h3 id="activeProducts">0</h3><p>In Stock</p></div>
                    </div>
                    <div class="card stat-card">
                        <div class="stat-icon danger"><i class='bx bx-error-circle'></i></div>
                        <div class="stat-details"><h3 id="outProducts">0</h3><p>Out of Stock</p></div>
                    </div>
                </div>

                <div class="card">
                    <div class="flex justify-between items-center mb-4 seller-toolbar">
                        <div class="flex gap-2 seller-filters">
                            <div class="header-search" style="border: 1px solid var(--border); background: var(--bg);">
                                <i class='bx bx-search'></i>
                                <input type="text" id="productSearch" placeholder="Search products..." oninput="renderProductsTable()">
                            </div>
                            <select class="form-control" id="stockFilter" style="width: 170px;" onchange="renderProductsTable()">
                                <option value="all">All stock</option>
                                <option value="in_stock">In stock</option>
                                <option value="out_of_stock">Out of stock</option>
                            </select>
                        </div>
                        <button class="btn btn-outline" onclick="loadProducts()"><i class='bx bx-refresh'></i> Refresh</button>
                    </div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th width="80">Image</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Shop</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="productsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="productModalTitle">Add Product</h3>
                <button class="close-modal" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm" onsubmit="saveProduct(event)">
                    <input type="hidden" id="productId">
                    <input type="hidden" id="currentImageUrl">
                    <div class="form-group">
                        <label class="form-label">Product Name</label>
                        <input class="form-control" id="productName" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Price</label>
                            <input class="form-control" id="productPrice" type="number" min="0" step="1000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Stock</label>
                            <input class="form-control" id="productQuantity" type="number" min="0" required>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <input class="form-control" id="productCategory" placeholder="Phone, Accessory...">
                        </div>
                        <div class="form-group" id="sellerIdGroup">
                            <label class="form-label">Seller ID</label>
                            <input class="form-control" id="productSellerId" type="number" min="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="productDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Image</label>
                        <input class="form-control" id="productImage" type="file" accept="image/*">
                    </div>
                    <p class="auth-message" id="productMessage"></p>
                    <div class="flex justify-between gap-2">
                        <button type="button" class="btn btn-outline" onclick="closeProductModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const user = requireAuth(['admin', 'seller']);
        let products = [];

        if (user) {
            renderSidebarMenu(user.role, 'product-management');
            renderHeader(user);
            document.getElementById('sellerIdGroup').style.display = user.role === 'admin' ? 'block' : 'none';
            loadProducts();
        }

        async function loadProducts() {
            const tbody = document.getElementById('productsBody');
            tbody.innerHTML = `<tr><td colspan="8" class="text-center" style="padding: 30px;">Loading...</td></tr>`;
            try {
                const url = user.role === 'seller' ? `/api/products/seller/${user.id}` : '/api/products/';
                const response = await fetch(url);
                products = await response.json();
                updateProductStats();
                renderProductsTable();
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center" style="padding: 30px; color: var(--danger);">Cannot load products</td></tr>`;
            }
        }

        function updateProductStats() {
            const active = products.filter(p => Number(p.stock || 0) > 0).length;
            document.getElementById('totalProducts').innerText = products.length;
            document.getElementById('activeProducts').innerText = active;
            document.getElementById('outProducts').innerText = products.length - active;
        }

        function renderProductsTable() {
            const tbody = document.getElementById('productsBody');
            const keyword = document.getElementById('productSearch').value.toLowerCase().trim();
            const stockFilter = document.getElementById('stockFilter').value;

            let filtered = products.filter(product => {
                const text = `${product.name || ''} ${product.category || ''} ${product.shopName || ''} ${product.sellerName || ''}`.toLowerCase();
                const matchKeyword = !keyword || text.includes(keyword);
                const stock = Number(product.stock || 0);
                const matchStock = stockFilter === 'all' || (stockFilter === 'in_stock' && stock > 0) || (stockFilter === 'out_of_stock' && stock <= 0);
                return matchKeyword && matchStock;
            });

            if (!filtered.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center" style="padding: 30px;">No products found</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(product => {
                const inStock = Number(product.stock || 0) > 0;
                return `
                    <tr>
                        <td><img src="${product.image || '/static/default.png'}" onerror="this.src='/static/default.png'" style="width: 52px; height: 52px; object-fit: cover; border-radius: var(--radius);"></td>
                        <td><strong>${escapeHtml(product.name || '-')}</strong></td>
                        <td>${escapeHtml(product.category || '-')}</td>
                        <td style="color: var(--primary); font-weight: 600;">${formatMoney(product.price || 0)}</td>
                        <td>${product.stock || 0}</td>
                        <td>
                            <strong>${escapeHtml(product.shopName || product.sellerName || '-')}</strong>
                            <div style="color: var(--text-light); font-size: 12px;">Seller #${product.sellerId || '-'}</div>
                        </td>
                        <td><span class="badge ${inStock ? 'badge-active' : 'badge-danger'}">${inStock ? 'IN STOCK' : 'OUT'}</span></td>
                        <td>
                            <div class="flex gap-2">
                                <button class="btn btn-outline btn-icon-sm" onclick="openProductForm(${product.id})"><i class='bx bx-edit-alt'></i></button>
                                <button class="btn btn-danger btn-icon-sm" onclick="deleteProduct(${product.id})"><i class='bx bx-trash'></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openProductForm(id = null) {
            document.getElementById('productForm').reset();
            document.getElementById('productMessage').innerText = '';
            document.getElementById('productMessage').className = 'auth-message';
            document.getElementById('productId').value = id || '';
            document.getElementById('currentImageUrl').value = '';
            document.getElementById('productSellerId').value = user.role === 'seller' ? user.id : '';

            if (id) {
                const product = products.find(p => p.id === id);
                if (!product) return;
                document.getElementById('productModalTitle').innerText = 'Edit Product';
                document.getElementById('productName').value = product.name || '';
                document.getElementById('productPrice').value = product.price || 0;
                document.getElementById('productQuantity').value = product.stock || 0;
                document.getElementById('productCategory').value = product.category || '';
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productSellerId').value = product.sellerId || user.id;
                document.getElementById('currentImageUrl').value = product.image || '';
            } else {
                document.getElementById('productModalTitle').innerText = 'Add Product';
            }

            document.getElementById('productModal').classList.add('active');
        }

        async function saveProduct(event) {
            event.preventDefault();
            const id = document.getElementById('productId').value;
            const message = document.getElementById('productMessage');
            message.className = 'auth-message';
            message.innerText = 'Saving...';

            const formData = new FormData();
            formData.append('user_id', user.role === 'seller' ? user.id : document.getElementById('productSellerId').value);
            formData.append('name', document.getElementById('productName').value);
            formData.append('price', document.getElementById('productPrice').value);
            formData.append('quantity', document.getElementById('productQuantity').value);
            formData.append('category', document.getElementById('productCategory').value);
            formData.append('description', document.getElementById('productDescription').value);
            formData.append('image_url', document.getElementById('currentImageUrl').value);

            const imageFile = document.getElementById('productImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            try {
                const response = await fetch(id ? `/api/products/${id}` : '/api/products/', {
                    method: id ? 'PATCH' : 'POST',
                    body: formData
                });
                const result = await response.json();

                if (!response.ok) {
                    message.classList.add('error');
                    message.innerText = result.message || 'Save failed';
                    return;
                }

                message.classList.add('success');
                message.innerText = result.message || 'Saved';
                await loadProducts();
                setTimeout(closeProductModal, 300);
            } catch (error) {
                message.classList.add('error');
                message.innerText = 'Cannot connect to server';
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try {
                const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (!response.ok) {
                    alert(result.message || 'Delete failed');
                    return;
                }
                await loadProducts();
            } catch (error) {
                alert('Cannot connect to server');
            }
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
