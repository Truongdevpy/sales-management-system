<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Product - Seller Area</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>Add New Product</h1>
                </div>

                <div class="card" style="max-width: 800px; margin: 0 auto;">
                    <h3 style="margin-bottom: 20px; font-size: 18px;">Product Details</h3>
                    <form id="productForm">
                        <div class="form-group">
                            <label class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="pName" placeholder="e.g., iPhone 17 ProMax">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label">Category</label>
                                <select class="form-control" id="pCategory">
                                    <option value="Điện thoại">Điện thoại</option>
                                    <option value="Phụ kiện">Phụ kiện</option>
                                    <option value="Đồ gia dụng">Đồ gia dụng</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select class="form-control">
                                    <option>Active</option>
                                    <option>Hidden</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label class="form-label">Price (VNĐ)</label>
                                <input type="number" class="form-control" id="pPrice" placeholder="0" value="0">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Stock Quantity</label>
                                <input type="number" class="form-control" id="pStock" placeholder="10" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tải ảnh lên</label>
                            <input type="file" class="form-control" id="pImage" accept="image/*">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="4" id="pDesc" placeholder="Describe your product..."></textarea>
                        </div>

                        <div class="flex justify-between items-center mt-4">
                            <button type="button" class="btn btn-outline" onclick="window.history.back()">Cancel</button>
                            <button type="button" class="btn btn-primary" onclick="saveProductToDB()"><i class='bx bx-save'></i> Save Product</button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const user = requireAuth(['seller']);
        
        if (user) {
            renderSidebarMenu(user.role, 'seller');
            renderHeader(user);
        }

        async function saveProductToDB() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const quantity = document.getElementById('pStock').value;
            const category = document.getElementById('pCategory').value;
            const description = document.getElementById('pDesc').value;
            
            // Lấy file ảnh từ input
            const imageInput = document.getElementById('pImage');
            const file = imageInput.files[0];

            if(!name || !price || parseFloat(price) <= 0) {
                return alert("Vui lòng nhập tên và giá sản phẩm (lớn hơn 0)!");
            }

            // Sử dụng FormData thay vì JSON
            const formData = new FormData();
            formData.append('user_id', user.id);
            formData.append('name', name);
            formData.append('price', price);
            formData.append('quantity', quantity || 0);
            formData.append('category', category);
            formData.append('description', description);
            
            if (file) {
                formData.append('image', file);
            }

            try {
                // Không set header 'Content-Type', trình duyệt sẽ tự set thành multipart/form-data
                const response = await fetch('/api/products/', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if(response.ok && result.status === 'success') {
                    alert('Đăng sản phẩm thành công!');
                    window.location.href = '/shop-products';
                } else {
                    alert('Lỗi khi thêm: ' + (result.message || 'Lỗi không xác định'));
                }
            } catch (error) {
                console.error("Lỗi:", error);
                alert("Không thể kết nối đến máy chủ.");
            }
        }
    </script>
</body>
</html>
