<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Shopping</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>Shop & Checkout</h1>
                </div>

                <div class="grid grid-cols-3 gap-20" style="gap: 24px;">
                    <!-- Shop Area -->
                    <div style="grid-column: span 2;">
                        <div class="flex justify-between items-center mb-4">
                            <h3 style="font-size: 18px;">All Products</h3>
                        </div>
                        <div class="grid grid-cols-2 gap-4" id="productList">
                            <!-- Rendered by JS -->
                        </div>
                    </div>

                    <!-- Cart Sidebar -->
                    <div>
                        <div class="card" style="position: sticky; top: 90px;">
                            <h3 style="margin-bottom: 20px; font-size: 18px; display: flex; justify-content: space-between;">
                                <span>Your Cart</span>
                                <span class="badge badge-active" id="cartCount">0</span>
                            </h3>

                            <div id="cartItems" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                                <!-- Cart Items -->
                                <p class="text-center text-light mt-4" style="font-size: 14px;">Cart is empty</p>
                            </div>

                            <div style="border-top: 1px solid var(--border); padding-top: 15px; margin-bottom: 20px;">
                                <div class="flex justify-between mb-2">
                                    <span style="color: var(--text-light);">Subtotal</span>
                                    <span style="font-weight: 500;" id="cartSubtotal">$0.00</span>
                                </div>
                                <div class="flex justify-between mb-2">
                                    <span style="color: var(--text-light);">Shipping</span>
                                    <span style="font-weight: 500;">$5.00</span>
                                </div>
                                <div class="flex justify-between mt-3 pt-3" style="border-top: 1px dashed var(--border);">
                                    <span style="font-weight: 600; font-size: 18px;">Total</span>
                                    <span style="font-weight: 700; font-size: 18px; color: var(--primary);" id="cartTotal">$0.00</span>
                                </div>
                            </div>

                            <h4 style="margin-bottom: 12px; font-size: 14px;">Shipping Details</h4>
                            <div class="form-group mb-2">
                                <input type="text" class="form-control" placeholder="Full Name" value="Mary Customer">
                            </div>
                            <div class="form-group mb-2">
                                <input type="text" class="form-control" placeholder="Phone Number">
                            </div>
                            <div class="form-group mb-4">
                                <textarea class="form-control" rows="2" placeholder="Delivery Address..."></textarea>
                            </div>

                            <button class="btn btn-primary" style="width: 100%;" onclick="processCheckout()" id="checkoutBtn" disabled>
                                <i class='bx bx-credit-card-front'></i> Proceed to Payment
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
    const user = requireAuth(['customer']);
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    if (user) {
        renderSidebarMenu(user.role, 'checkout');
        renderHeader(user);
        loadRealProducts(); // Gọi hàm lấy dữ liệu thật
        renderCart();
    }

    async function loadRealProducts() {
    try {
        const response = await fetch('/api/products'); // Gọi đến API vừa tạo ở Bước 1
        const products = await response.json();
        
        const container = document.getElementById('productList');
        let html = '';
        
        if (products.length === 0) {
            container.innerHTML = '<p>Không có sản phẩm nào trong kho.</p>';
            return;
        }

        products.forEach(p => {
            // Sử dụng đúng tên cột từ bảng products của bạn
            html += `
                <div class="card product-card">
                    <img src="${p.image || '/static/default-product.png'}" class="product-img" onerror="this.src='/static/default-product.png'">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">${formatMoney(p.price)}</div>
                        <p style="font-size: 12px; color: var(--text-light);">Kho: ${p.stock} | ${p.category}</p>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" 
                            onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    } catch (error) {
        console.error("Lỗi kết nối API:", error);
        document.getElementById('productList').innerHTML = '<p>Không thể tải dữ liệu từ máy chủ.</p>';
    }
}

    async function processCheckout() {
        if (cart.length === 0) return alert("Giỏ hàng trống!");

        // Gửi dữ liệu thật lên API mà bạn đã viết trong order_services.py
        const response = await fetch('/api/orders/place-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                customer_id: user.id,
                cart_data: cart
            })
        });

        const result = await response.json();
        if (response.ok) {
            alert('Đặt hàng thành công! Mã đơn: ' + result.order_id);
            localStorage.removeItem('cart');
            window.location.href = '/track-order';
        } else {
            alert('Lỗi: ' + result.message);
        }
    }
</script>
</body>
</html>
