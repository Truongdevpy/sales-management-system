<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Sales System</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .product-detail-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .detail-img {
            width: 100%;
            height: auto;
            border-radius: var(--radius);
            object-fit: contain;
            background: var(--bg);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="app-layout" id="appLayout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div style="margin-bottom: 20px;">
                    <a href="/dashboard" class="btn btn-outline" style="display: inline-flex; align-items: center; gap: 5px;">
                        <i class='bx bx-arrow-back'></i> Quay lại Dashboard
                    </a>
                </div>

                <div id="productDetailArea">
                    <div style="text-align: center; padding: 50px;">
                        <i class='bx bx-loader-alt bx-spin' style="font-size: 40px; color: var(--primary);"></i>
                        <p class="mt-2">Đang tải thông tin sản phẩm...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const user = requireAuth();

        if (user) {
            renderSidebarMenu(user.role, 'dashboard'); // Vẫn highlight menu dashboard
            renderHeader(user);
            loadProductDetail();
        }

        async function loadProductDetail() {
            // 1. Lấy ID sản phẩm từ URL (VD: /product-detail?id=5)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            const container = document.getElementById('productDetailArea');

            if (!productId) {
                container.innerHTML = `<div class="card text-center"><h3 class="text-danger">Không tìm thấy mã sản phẩm.</h3></div>`;
                return;
            }

            try {
                // 2. Gọi API lấy toàn bộ sản phẩm
                const response = await fetch('/api/products/');
                const allProducts = await response.json();

                // 3. Tìm sản phẩm có ID tương ứng
                const p = allProducts.find(item => item.id === productId);

                if (!p) {
                    container.innerHTML = `<div class="card text-center"><h3 class="text-danger">Sản phẩm không tồn tại hoặc đã bị xóa.</h3></div>`;
                    return;
                }

                // 4. Vẽ giao diện chi tiết
                let isOOS = p.stock <= 0;
                let stockBadge = isOOS ? 
                    `<span class="badge badge-danger">Hết hàng</span>` : 
                    `<span class="badge badge-active">Còn hàng: ${p.stock}</span>`;

                container.innerHTML = `
                    <div class="product-detail-container">
                        <div>
                            <img src="${p.image || '/static/default.png'}" class="detail-img" onerror="this.src='/static/default.png'">
                        </div>
                        <div>
                            <p style="color: var(--text-light); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; margin-bottom: 8px;">${p.category || 'Khác'}</p>
                            <h1 style="font-size: 28px; margin-bottom: 15px;">${p.name}</h1>
                            <h2 style="color: var(--primary); font-size: 24px; margin-bottom: 20px;">${formatMoney(p.price)}</h2>
                            
                            <div style="margin-bottom: 25px;">${stockBadge}</div>
                            
                            <div style="margin-bottom: 30px;">
                                <h4 style="margin-bottom: 10px; font-size: 16px;">Mô tả sản phẩm:</h4>
                                <p style="color: var(--text-light); line-height: 1.6; font-size: 14px; white-space: pre-wrap;">${p.description || 'Chưa có mô tả cho sản phẩm này.'}</p>
                            </div>

                            <button class="btn btn-primary" style="padding: 12px 24px; font-size: 16px;" 
                                onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.image || '/static/default.png'}', ${p.stock})" 
                                ${isOOS ? "disabled" : ""}>
                                <i class='bx bx-cart-add'></i> Thêm vào giỏ hàng
                            </button>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error("Lỗi tải chi tiết:", error);
                container.innerHTML = `<div class="card text-center"><p class="text-danger">Lỗi kết nối máy chủ.</p></div>`;
            }
        }

        // Hàm xử lý Thêm vào giỏ hàng (Giống hệt ở Dashboard)
        function addToCart(id, name, price, image, stock) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let existingItem = cart.find(item => item.product_id === id);

            if (existingItem) {
                if (existingItem.quantity < stock) {
                    existingItem.quantity += 1;
                    alert(`Đã tăng số lượng "${name}" trong giỏ hàng!`);
                } else {
                    alert(`Xin lỗi, sản phẩm này chỉ còn tối đa ${stock} cái.`);
                    return;
                }
            } else {
                cart.push({ product_id: id, name: name, price: price, quantity: 1, image: image, stock: stock });
                alert(`Đã thêm "${name}" vào giỏ hàng thành công!`);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
        }
    </script>
</body>
</html>
