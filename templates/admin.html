<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sellers Management</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class='bx bxs-pie-chart-alt-2'></i>
                    <span>SalesSystem</span>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>

        <main class="main-content">
            <header class="top-header" id="topHeader"></header>

            <div class="page-content">
                <div class="page-title">
                    <h1>Admin Management</h1>
                </div>

                <div class="card mb-4" style="padding: 0;">
                    <div class="flex admin-tabs">
                        <button class="btn admin-tab active" id="requestsTabBtn" onclick="switchTab('requests')">
                            <i class='bx bx-time-five'></i> Seller Requests
                        </button>
                        <button class="btn admin-tab" id="managementTabBtn" onclick="switchTab('management')">
                            <i class='bx bx-store-alt'></i> Seller Management
                        </button>
                    </div>
                </div>

                <div id="tab-requests" class="card">
                    <div class="flex justify-between items-center mb-4">
                        <h3 style="font-size: 18px; color: var(--dark);">Pending Seller Review</h3>
                        <button class="btn btn-outline" onclick="loadSellerRequests()"><i class='bx bx-refresh'></i> Refresh</button>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Shop Name</th>
                                    <th>Owner</th>
                                    <th>Username/Email</th>
                                    <th>Registered</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="sellerRequestsBody"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-management" class="card hidden">
                    <div class="flex justify-between items-center mb-4 seller-toolbar">
                        <h3 style="font-size: 18px; color: var(--dark);">Seller Management & Shop Statistics</h3>
                        <div class="flex gap-2 seller-filters">
                            <div class="header-search" style="border: 1px solid var(--border); background: var(--bg);">
                                <i class='bx bx-search'></i>
                                <input type="text" id="sellerKeyword" placeholder="Search seller..." oninput="debouncedLoadSellerManagement()">
                            </div>
                            <select class="form-control" id="sellerStatusFilter" style="width: 160px;" onchange="loadSellerManagement()">
                                <option value="all">All status</option>
                                <option value="pending">Pending</option>
                                <option value="approved">Approved</option>
                                <option value="rejected">Rejected</option>
                            </select>
                            <button class="btn btn-outline" onclick="loadSellerManagement()"><i class='bx bx-refresh'></i></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 mb-4" id="sellerSummaryCards"></div>

                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Seller</th>
                                    <th>Shop</th>
                                    <th>Status</th>
                                    <th>Products</th>
                                    <th>Buyers</th>
                                    <th>Orders</th>
                                    <th>Sales</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="sellerManagementBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="sellerModal">
        <div class="modal seller-modal">
            <div class="modal-header">
                <h3 id="sellerModalTitle">Seller Details</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        const user = requireAuth(['admin']);
        let sellerRequests = [];
        let sellerManagement = [];
        let searchTimer = null;

        if (user) {
            renderSidebarMenu(user.role, 'admin');
            renderHeader(user);
            loadSellerRequests();
            loadSellerManagement();
        }

        function switchTab(tab) {
            ['requests', 'management'].forEach(name => {
                document.getElementById(`tab-${name}`).classList.toggle('hidden', name !== tab);
                document.getElementById(`${name}TabBtn`).classList.toggle('active', name === tab);
            });
        }

        function debouncedLoadSellerManagement() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(loadSellerManagement, 250);
        }

        async function loadSellerRequests() {
            const tbody = document.getElementById('sellerRequestsBody');
            tbody.innerHTML = loadingRow(7);

            try {
                const response = await fetch('/api/users/seller-management?status=pending');
                sellerRequests = await response.json();
                renderSellerRequests();
            } catch (error) {
                tbody.innerHTML = errorRow(7, 'Cannot load seller requests');
            }
        }

        function renderSellerRequests() {
            const tbody = document.getElementById('sellerRequestsBody');
            if (!sellerRequests.length) {
                tbody.innerHTML = emptyRow(7, 'No pending seller requests');
                return;
            }

            tbody.innerHTML = sellerRequests.map(req => `
                <tr>
                    <td>#${req.id}</td>
                    <td><strong>${escapeHtml(req.shopName || '-')}</strong></td>
                    <td>${escapeHtml(req.fullName || '-')}</td>
                    <td>${escapeHtml(req.username || '-')}</td>
                    <td>${formatDateSafe(req.createdAt)}</td>
                    <td><span class="badge ${getStatusBadgeClass(req.status)}">${req.status.toUpperCase()}</span></td>
                    <td>
                        <div class="flex gap-2">
                            <button class="btn btn-outline btn-icon-sm" onclick="openSellerDetail(${req.id})"><i class='bx bx-show'></i></button>
                            <button class="btn btn-success btn-icon-sm" onclick="updateSellerStatus(${req.id}, 'approved')"><i class='bx bx-check'></i></button>
                            <button class="btn btn-danger btn-icon-sm" onclick="updateSellerStatus(${req.id}, 'rejected')"><i class='bx bx-x'></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function loadSellerManagement() {
            const tbody = document.getElementById('sellerManagementBody');
            tbody.innerHTML = loadingRow(8);

            const status = document.getElementById('sellerStatusFilter').value;
            const keyword = document.getElementById('sellerKeyword').value.trim();
            const params = new URLSearchParams({ status, keyword });

            try {
                const response = await fetch(`/api/users/seller-management?${params.toString()}`);
                sellerManagement = await response.json();
                renderSellerSummary(sellerManagement);
                renderSellerManagement(sellerManagement);
            } catch (error) {
                document.getElementById('sellerSummaryCards').innerHTML = '';
                tbody.innerHTML = errorRow(8, 'Cannot load sellers');
            }
        }

        function renderSellerSummary(sellers) {
            const approved = sellers.filter(s => s.status === 'approved').length;
            const pending = sellers.filter(s => s.status === 'pending').length;
            const buyers = sellers.reduce((sum, s) => sum + Number(s.totalBuyers || 0), 0);

            document.getElementById('sellerSummaryCards').innerHTML = `
                <div class="seller-summary-tile"><div class="stat-icon primary"><i class='bx bx-store'></i></div><div class="stat-details"><h3>${sellers.length}</h3><p>Total Sellers</p></div></div>
                <div class="seller-summary-tile"><div class="stat-icon success"><i class='bx bx-check-shield'></i></div><div class="stat-details"><h3>${approved}</h3><p>Approved</p></div></div>
                <div class="seller-summary-tile"><div class="stat-icon warning"><i class='bx bx-time'></i></div><div class="stat-details"><h3>${pending}</h3><p>Pending</p></div></div>
                <div class="seller-summary-tile"><div class="stat-icon info"><i class='bx bx-user-check'></i></div><div class="stat-details"><h3>${buyers}</h3><p>Buyers</p></div></div>
            `;
        }

        function renderSellerManagement(sellers) {
            const tbody = document.getElementById('sellerManagementBody');
            if (!sellers.length) {
                tbody.innerHTML = emptyRow(8, 'No sellers found');
                return;
            }

            tbody.innerHTML = sellers.map(seller => `
                <tr>
                    <td>
                        <strong>${escapeHtml(seller.fullName || seller.username || '-')}</strong>
                        <div style="color: var(--text-light); font-size: 12px;">${escapeHtml(seller.username || '-')}</div>
                    </td>
                    <td>${escapeHtml(seller.shopName || '-')}</td>
                    <td><span class="badge ${getStatusBadgeClass(seller.status)}">${seller.status.toUpperCase()}</span></td>
                    <td>${seller.totalProducts || 0}</td>
                    <td>${seller.totalBuyers || 0}</td>
                    <td>${seller.totalOrders || 0}</td>
                    <td style="font-weight: 600; color: var(--success);">${formatMoney(seller.totalSales || 0)}</td>
                    <td>
                        <div class="flex gap-2">
                            <button class="btn btn-outline btn-icon-sm" title="View" onclick="openSellerDetail(${seller.id})"><i class='bx bx-show'></i></button>
                            <button class="btn btn-outline btn-icon-sm" title="Edit" onclick="openSellerEdit(${seller.id})"><i class='bx bx-edit'></i></button>
                            <button class="btn btn-outline btn-icon-sm" title="Bank" onclick="openBankConfig(${seller.id})"><i class='bx bx-credit-card'></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function openSellerDetail(id) {
            document.getElementById('sellerModalTitle').innerText = 'Seller Details';
            document.getElementById('modalBody').innerHTML = `<p class="text-center" style="padding: 30px;">Loading...</p>`;
            document.getElementById('sellerModal').classList.add('active');

            try {
                const response = await fetch(`/api/users/seller-management/${id}`);
                const seller = await response.json();
                if (!response.ok) {
                    document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">${seller.message || 'Seller not found'}</p>`;
                    return;
                }
                renderSellerDetailModal(seller);
            } catch (error) {
                document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">Cannot load seller detail</p>`;
            }
        }

        async function openSellerEdit(id) {
            document.getElementById('sellerModalTitle').innerText = 'Edit Seller';
            document.getElementById('modalBody').innerHTML = `<p class="text-center" style="padding: 30px;">Loading...</p>`;
            document.getElementById('sellerModal').classList.add('active');

            try {
                const response = await fetch(`/api/users/seller-management/${id}`);
                const seller = await response.json();
                if (!response.ok) {
                    document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">${seller.message || 'Seller not found'}</p>`;
                    return;
                }
                renderSellerEditModal(seller);
            } catch (error) {
                document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">Cannot load seller detail</p>`;
            }
        }

        async function openBankConfig(id) {
            document.getElementById('sellerModalTitle').innerText = 'Bank Payment Config';
            document.getElementById('modalBody').innerHTML = `<p class="text-center" style="padding: 30px;">Loading...</p>`;
            document.getElementById('sellerModal').classList.add('active');

            try {
                const response = await fetch(`/api/users/seller-management/${id}/bank-config`);
                const config = await response.json();
                if (!response.ok) {
                    document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">${config.message || 'Cannot load config'}</p>`;
                    return;
                }
                renderBankConfigModal(id, config);
            } catch (error) {
                document.getElementById('modalBody').innerHTML = `<p class="text-center" style="color: var(--danger);">Cannot load bank config</p>`;
            }
        }

        function renderSellerDetailModal(seller) {
            const bank = seller.bankConfig;
            document.getElementById('modalBody').innerHTML = `
                ${renderSellerOverview(seller)}
                <div class="grid grid-cols-4 mb-4 seller-detail-stats">
                    <div class="seller-metric"><strong>${seller.totalProducts || 0}</strong><span>Products</span></div>
                    <div class="seller-metric"><strong>${seller.totalBuyers || 0}</strong><span>Buyers</span></div>
                    <div class="seller-metric"><strong>${seller.totalOrders || 0}</strong><span>Orders</span></div>
                    <div class="seller-metric"><strong>${formatMoney(seller.totalSales || 0)}</strong><span>Sales</span></div>
                </div>
                <div class="seller-detail-section">
                    <h4>Bank Payment</h4>
                    <p style="color: var(--text-light);">${bank ? `${escapeHtml(bank.bankName || '-')} - ${escapeHtml(bank.accountNo || '-')}` : 'Chưa cấu hình ngân hàng'}</p>
                </div>
                <div class="seller-detail-section">
                    <h4>Products</h4>
                    ${renderProductsTable(seller.products || [])}
                </div>
                <div class="seller-detail-section">
                    <h4>Buyers</h4>
                    ${renderBuyersTable(seller.buyers || [])}
                </div>
                <div class="flex justify-between gap-2 mt-4">
                    <div class="flex gap-2">
                        <button class="btn btn-outline" onclick="openSellerEdit(${seller.id})"><i class='bx bx-edit'></i> Edit Seller</button>
                        <button class="btn btn-outline" onclick="openBankConfig(${seller.id})"><i class='bx bx-credit-card'></i> Bank Config</button>
                    </div>
                    <div class="flex gap-2">
                        <button class="btn btn-danger" onclick="updateSellerStatus(${seller.id}, 'rejected')">Reject</button>
                        <button class="btn btn-success" onclick="updateSellerStatus(${seller.id}, 'approved')">Approve</button>
                    </div>
                </div>
            `;
        }

        function renderSellerEditModal(seller) {
            document.getElementById('modalBody').innerHTML = `
                <form id="sellerEditForm" onsubmit="saveSeller(event, ${seller.id})">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Owner Name</label>
                            <input class="form-control" id="editFullName" value="${escapeAttr(seller.fullName || '')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Username/Email</label>
                            <input class="form-control" id="editUsername" value="${escapeAttr(seller.username || '')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Shop Name</label>
                            <input class="form-control" id="editShopName" value="${escapeAttr(seller.shopName || '')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input class="form-control" id="editPhone" value="${escapeAttr(seller.phone || '')}" placeholder="0901234567">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Business Type</label>
                            <input class="form-control" id="editBusinessType" value="${escapeAttr(seller.businessType || '')}" placeholder="Dien thoai, thoi trang...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select class="form-control" id="editStatus">
                                <option value="pending" ${seller.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="approved" ${seller.status === 'approved' ? 'selected' : ''}>Approved</option>
                                <option value="rejected" ${seller.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Shop Address</label>
                        <input class="form-control" id="editAddress" value="${escapeAttr(seller.address || '')}" placeholder="Shop address">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Shop Description</label>
                        <textarea class="form-control" id="editShopDescription" rows="3" placeholder="Shop description">${escapeHtml(seller.shopDescription || '')}</textarea>
                    </div>
                    <p id="sellerEditMessage" class="auth-message"></p>
                    <div class="flex justify-between gap-2 mt-4">
                        <button type="button" class="btn btn-outline" onclick="openSellerDetail(${seller.id})">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> Save Seller</button>
                    </div>
                </form>
            `;
        }

        function renderBankConfigModal(sellerId, config) {
            document.getElementById('modalBody').innerHTML = `
                <form id="bankConfigForm" onsubmit="saveBankConfig(event, ${sellerId})">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Bank Name</label>
                            <input class="form-control" id="bankName" value="${escapeAttr(config.bankName || '')}" placeholder="MB Bank, Vietcombank...">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Bank ACQ ID</label>
                            <input class="form-control" id="bankAcqId" value="${escapeAttr(config.bankAcqId || '')}" placeholder="VD: 970422">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Account No</label>
                            <input class="form-control" id="accountNo" value="${escapeAttr(config.accountNo || '')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Account Name</label>
                            <input class="form-control" id="accountName" value="${escapeAttr(config.accountName || '')}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">VietQR Client ID</label>
                            <input class="form-control" id="vietqrClientId" value="${escapeAttr(config.vietqrClientId || '')}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">VietQR API Key</label>
                            <input class="form-control" id="vietqrApiKey" value="${escapeAttr(config.vietqrApiKey || '')}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bank History Token</label>
                        <input class="form-control" id="bankHistoryToken" value="${escapeAttr(config.bankHistoryToken || '')}" placeholder="Token API thueapi.pro">
                    </div>
                    <p style="font-size: 12px; color: var(--text-light);">
                        Đối soát thành công khi giao dịch IN có đúng số tiền và phần mô tả chứa mã đơn hệ thống tạo.
                    </p>
                    <p id="bankConfigMessage" class="auth-message"></p>
                    <div class="flex justify-between gap-2 mt-4">
                        <button type="button" class="btn btn-outline" onclick="openSellerDetail(${sellerId})">Cancel</button>
                        <button type="submit" class="btn btn-primary"><i class='bx bx-save'></i> Save Bank Config</button>
                    </div>
                </form>
            `;
        }

        function renderSellerOverview(seller) {
            return `
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><p class="seller-field-label">Shop Name</p><p class="seller-field-value">${escapeHtml(seller.shopName || '-')}</p></div>
                    <div><p class="seller-field-label">Owner Name</p><p class="seller-field-value">${escapeHtml(seller.fullName || '-')}</p></div>
                    <div><p class="seller-field-label">Username/Email</p><p class="seller-field-value">${escapeHtml(seller.username || '-')}</p></div>
                    <div><p class="seller-field-label">Phone</p><p class="seller-field-value">${escapeHtml(seller.phone || '-')}</p></div>
                    <div><p class="seller-field-label">Business Type</p><p class="seller-field-value">${escapeHtml(seller.businessType || '-')}</p></div>
                    <div><p class="seller-field-label">Address</p><p class="seller-field-value">${escapeHtml(seller.address || '-')}</p></div>
                    <div><p class="seller-field-label">Status</p><span class="badge ${getStatusBadgeClass(seller.status)}">${seller.status.toUpperCase()}</span></div>
                </div>
                <div class="mb-4">
                    <p class="seller-field-label">Shop Description</p>
                    <p class="seller-field-value">${escapeHtml(seller.shopDescription || '-')}</p>
                </div>
            `;
        }

        function renderProductsTable(products) {
            if (!products.length) return `<p style="color: var(--text-light);">No products</p>`;
            return `
                <div class="table-responsive seller-inner-table">
                    <table>
                        <thead><tr><th>Product</th><th>Category</th><th>Stock</th><th>Price</th></tr></thead>
                        <tbody>
                            ${products.map(product => `
                                <tr>
                                    <td>${escapeHtml(product.name || '-')}</td>
                                    <td>${escapeHtml(product.category || '-')}</td>
                                    <td>${product.stock || 0}</td>
                                    <td>${formatMoney(product.price || 0)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderBuyersTable(buyers) {
            if (!buyers.length) return `<p style="color: var(--text-light);">No buyers yet</p>`;
            return `
                <div class="table-responsive seller-inner-table">
                    <table>
                        <thead><tr><th>Buyer</th><th>Orders</th><th>Total Spent</th><th>Last Order</th></tr></thead>
                        <tbody>
                            ${buyers.map(buyer => `
                                <tr>
                                    <td><strong>${escapeHtml(buyer.buyerName || '-')}</strong><div style="font-size: 12px; color: var(--text-light);">${escapeHtml(buyer.buyerUsername || '-')}</div></td>
                                    <td>${buyer.totalOrders || 0}</td>
                                    <td>${formatMoney(buyer.totalSpent || 0)}</td>
                                    <td>${formatDateSafe(buyer.lastOrderAt)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function saveSeller(event, id) {
            event.preventDefault();
            const message = document.getElementById('sellerEditMessage');
            message.className = 'auth-message';
            message.innerText = 'Saving...';

            try {
                const response = await fetch(`/api/users/seller-management/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: document.getElementById('editFullName').value,
                        username: document.getElementById('editUsername').value,
                        shopName: document.getElementById('editShopName').value,
                        phone: document.getElementById('editPhone').value,
                        businessType: document.getElementById('editBusinessType').value,
                        address: document.getElementById('editAddress').value,
                        shopDescription: document.getElementById('editShopDescription').value,
                        status: document.getElementById('editStatus').value
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    message.classList.add('error');
                    message.innerText = result.message || 'Update failed';
                    return;
                }
                message.classList.add('success');
                message.innerText = result.message || 'Seller updated';
                await refreshAdminData();
                setTimeout(() => openSellerDetail(id), 300);
            } catch (error) {
                message.classList.add('error');
                message.innerText = 'Cannot connect to server';
            }
        }

        async function saveBankConfig(event, sellerId) {
            event.preventDefault();
            const message = document.getElementById('bankConfigMessage');
            message.className = 'auth-message';
            message.innerText = 'Saving...';

            try {
                const response = await fetch(`/api/users/seller-management/${sellerId}/bank-config`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bankName: document.getElementById('bankName').value,
                        bankAcqId: document.getElementById('bankAcqId').value,
                        accountNo: document.getElementById('accountNo').value,
                        accountName: document.getElementById('accountName').value,
                        vietqrClientId: document.getElementById('vietqrClientId').value,
                        vietqrApiKey: document.getElementById('vietqrApiKey').value,
                        bankHistoryToken: document.getElementById('bankHistoryToken').value,
                        isActive: true
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    message.classList.add('error');
                    message.innerText = result.message || 'Save failed';
                    return;
                }
                message.classList.add('success');
                message.innerText = result.message || 'Saved';
                setTimeout(() => openSellerDetail(sellerId), 300);
            } catch (error) {
                message.classList.add('error');
                message.innerText = 'Cannot connect to server';
            }
        }

        async function updateSellerStatus(id, status) {
            try {
                const response = await fetch(`/api/users/seller-requests/${id}/${status}`, { method: 'POST' });
                if (!response.ok) {
                    const result = await response.json();
                    alert(result.message || 'Update failed');
                    return;
                }
                await refreshAdminData();
                closeModal();
            } catch (error) {
                alert('Cannot connect to server');
            }
        }

        async function refreshAdminData() {
            await Promise.all([loadSellerRequests(), loadSellerManagement()]);
        }

        function closeModal() {
            document.getElementById('sellerModal').classList.remove('active');
        }

        function getStatusBadgeClass(status) {
            if (status === 'approved') return 'badge-approved';
            if (status === 'rejected') return 'badge-rejected';
            return 'badge-pending';
        }

        function loadingRow(colspan) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px;">Loading...</td></tr>`;
        }

        function emptyRow(colspan, message) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px;">${message}</td></tr>`;
        }

        function errorRow(colspan, message) {
            return `<tr><td colspan="${colspan}" class="text-center" style="padding: 30px; color: var(--danger);">${message}</td></tr>`;
        }

        function formatDateSafe(value) {
            if (!value) return '-';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('vi-VN');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
